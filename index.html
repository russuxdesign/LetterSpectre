<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Letter Spectre</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030008;
    --purple: #6b21a8;
    --cyan: #22d3ee;
    --red: #ff2222;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: #e2d4f0;
    font-family: 'Crimson Text', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  #spectre-container { width: 240px; height: 180px; margin-top: 5px; position: relative; z-index: 100; }
  #spectre-img { width: 100%; height: 100%; object-fit: contain; }
  .eye-glow {
    position: absolute; top: 42%; width: 8px; height: 5px;
    background: var(--red); border-radius: 50%; filter: blur(3px);
    box-shadow: 0 0 12px 4px var(--red);
    animation: eyePulse 3s infinite ease-in-out;
  }
  #eye-left { left: 43%; }
  #eye-right { right: 43%; }
  @keyframes eyePulse { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.3); } }
  #bubble-wrap { position: relative; margin: 10px 0; z-index: 90; }
  #bubble {
    background: rgba(15, 0, 30, 0.95); border: 2px solid var(--purple);
    padding: 15px 35px 15px 15px; width: 90vw; max-width: 500px;
    border-radius: 12px; text-align: center; position: relative;
  }
  #bubble::after {
    content: ''; position: absolute; top: -15px; left: 50%;
    transform: translateX(-50%); border-left: 15px solid transparent;
    border-right: 15px solid transparent; border-bottom: 15px solid var(--purple);
  }
  #close-bubble { position: absolute; right: 10px; top: 5px; color: var(--purple); cursor: pointer; font-family: sans-serif; font-weight: bold; }
  #input-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; z-index: 101; }
  #status-msg { height: 20px; font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--red); margin-bottom: 5px; }
  #input-row { display: flex; align-items: stretch; }
  #guess-input {
    background: #000; border: 1px solid var(--purple); color: white;
    padding: 10px; font-family: 'Cinzel', serif; width: 280px;
    border-top-left-radius: 5px; border-bottom-left-radius: 5px; border-right: none;
    text-transform: uppercase; outline: none;
  }
  #guess-btn { 
    background: linear-gradient(to bottom, var(--purple), #3b0764);
    color: white; border: 1px solid var(--purple); padding: 0 20px; 
    border-top-right-radius: 5px; border-bottom-right-radius: 5px; cursor: pointer;
  }
  .column-label { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--purple); letter-spacing: 2px; margin-bottom: 4px; }
  #game-stage { flex: 1; width: 100%; max-width: 900px; display: flex; justify-content: center; align-items: center; gap: 5px; }
  #box-wrap { width: 380px; position: relative; z-index: 20; }
  #box-img { width: 100%; display: block; animation: boxRattle 12s infinite; }
  @keyframes boxRattle { 0%, 94%, 100% { transform: translateX(0); } 95%, 97% { transform: translateX(-4px); } 96%, 98% { transform: translateX(4px); } }
  .sword-column { display: flex; flex-direction: column; gap: 10px; width: 120px; align-items: center; }
  .slot { width: 110px; height: 55px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
  .sword-static { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
  .hand-plunge { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 10; transition: transform 0.6s cubic-bezier(0.5, 0, 0.5, 1), opacity 0.5s; }
  #end-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
  #end-title { font-family:'Cinzel Decorative'; font-size:2.5rem; }
  #end-stats { margin: 15px 0; text-align: left; line-height: 1.6; min-width: 200px; }
  .end-btn { margin-top: 10px; padding: 12px 25px; font-family: 'Cinzel', serif; cursor: pointer; border-radius: 4px; border: none; width: 200px; }
  .hint-text { font-family: 'Cinzel', serif; font-size: 0.75rem; text-shadow: 0 0 8px currentColor; text-align: center; }
</style>
</head>
<body>

<div id="spectre-container">
  <img id="spectre-img" src="spectrehead.png">
  <div class="eye-glow" id="eye-left"></div>
  <div class="eye-glow" id="eye-right"></div>
</div>

<div id="bubble-wrap">
  <div id="bubble">
    <div id="close-bubble" onclick="this.parentElement.parentElement.style.display='none'">X</div>
    <p>I’m thinking of a word. Guess what it is to free the man in the box. One sword is <span style="color:var(--cyan); font-weight:bold;">CURSED</span>.</p>
  </div>
</div>

<div id="input-section">
  <div id="status-msg"></div>
  <div id="input-row">
    <input type="text" id="guess-input" placeholder="ENTER WORD" autocomplete="off">
    <button id="guess-btn">➔</button>
  </div>
</div>

<div id="game-stage">
  <div class="sword-column">
    <div class="column-label">SYNONYMS</div>
    <div class="slot" onclick="doPlunge(this, 0, false)"><img class="sword-static" src="sword-nohand.png"></div>
    <div class="slot" onclick="doPlunge(this, 1, false)"><img class="sword-static" src="sword-nohand.png"></div>
    <div class="slot" onclick="doPlunge(this, 2, false)"><img class="sword-static" src="sword-nohand.png"></div>
    <div class="slot" onclick="doPlunge(this, 3, false)"><img class="sword-static" src="sword-nohand.png"></div>
  </div>
  <div id="box-wrap"><img id="box-img" src="box-Photoroom.png"></div>
  <div class="sword-column">
    <div class="column-label">ANTONYMS</div>
    <div class="slot" onclick="doPlunge(this, 4, true)"><img class="sword-static" src="sword-nohand.png" style="transform: scaleX(-1);"></div>
    <div class="slot" onclick="doPlunge(this, 5, true)"><img class="sword-static" src="sword-nohand.png" style="transform: scaleX(-1);"></div>
    <div class="slot" onclick="doPlunge(this, 6, true)"><img class="sword-static" src="sword-nohand.png" style="transform: scaleX(-1);"></div>
    <div class="slot" onclick="doPlunge(this, 7, true)"><img class="sword-static" src="sword-nohand.png" style="transform: scaleX(-1);"></div>
  </div>
</div>

<div id="end-overlay">
  <h1 id="end-title"></h1>
  <div id="end-stats"></div>
  <button class="end-btn" style="background:white; color:black;" onclick="share()">SHARE RESULTS</button>
  <button id="retry-btn" class="end-btn" style="background:var(--purple); color:white;" onclick="location.reload()">TRY AGAIN</button>
</div>

<script>
  const gasp = new Audio('freesound_community-male-gasp-1-7183.mp3');
  const scream = new Audio('nematoki-falling-man-scream-450793.mp3');
  const winChime = new Audio('djartmusic-christmas-chimes-whoosh-264365.mp3');

  // THE EXPANDED LIBRARY
  const eternityLibrary = [
    { w: "SACRIFICE", h: ["OFFERING", "LOSS", "TOLL", "SURRENDER", "GAIN", "WIN", "KEEP", "SAVE"] },
    { w: "VALOR", h: ["BRAVERY", "COURAGE", "HEROISM", "SPIRIT", "FEAR", "COWARDICE", "WEAKNESS", "DREAD"] },
    { w: "ENIGMA", h: ["PUZZLE", "MYSTERY", "RIDDLE", "CONUNDRUM", "ANSWER", "SOLUTION", "CLARITY", "FACT"] },
    { w: "ANCIENT", h: ["ANTIQUE", "AGED", "RELICT", "PRIMEVAL", "MODERN", "RECENT", "NEW", "CURRENT"] },
    { w: "SHADOW", h: ["DARKNESS", "GLOOM", "OBSCURITY", "SHADE", "LIGHT", "BRIGHTNESS", "SUN", "GLARE"] },
    { w: "ETERNAL", h: ["ENDLESS", "TIMELESS", "PERPETUAL", "IMMORTAL", "FINITE", "MORTAL", "ENDING", "TEMPORARY"] },
    { w: "PHANTOM", h: ["GHOST", "SPIRIT", "SPECTRE", "WRAITH", "REALITY", "BEING", "ENTITY", "BODY"] },
    { w: "FORBIDDEN", h: ["BANNED", "VETOED", "TABOO", "OUTLAWED", "ALLOWED", "PERMITTED", "LEGAL", "OPEN"] },
    { w: "OBSIDIAN", h: ["JET", "EBONY", "ONYX", "DARK", "IVORY", "WHITE", "CLEAR", "BRIGHT"] },
    { w: "CRYPTIC", h: ["VAGUE", "ARCANE", "HIDDEN", "OBSCURE", "OBVIOUS", "PLAIN", "CLEAR", "EXPLICIT"] },
    { w: "ALCHEMIST", h: ["MAGUS", "SORCERER", "WIZARD", "SAGE", "FOOL", "AMATEUR", "IGNORANT", "NOVICE"] },
    { w: "CELESTIAL", h: ["DIVINE", "STELLAR", "ASTRAL", "HOLY", "EARTHLY", "MORTAL", "VULGAR", "HELLISH"] },
    { w: "CATACOMB", h: ["VAULT", "TOMB", "CRYPT", "BURIAL", "SKY", "PEAK", "SURFACE", "OPENING"] },
    { w: "DRASTIC", h: ["EXTREME", "SEVERE", "HARSH", "RADICAL", "MILD", "SLIGHT", "GENTLE", "MINOR"] },
    { w: "REVENANT", h: ["SPIRIT", "SHADE", "ZOMBIE", "GHOST", "LIVING", "HUMAN", "ALIVE", "MORTAL"] },
    { w: "NEBULOUS", h: ["CLOUDY", "HAZY", "FUZZY", "MISTY", "SHARP", "CLEAR", "DEFINED", "BRIGHT"] },
    { w: "SINISTER", h: ["EVIL", "OMINOUS", "BALEFUL", "MALIGN", "GOOD", "KIND", "HOLY", "BENIGN"] },
    { w: "VOYAGE", h: ["JOURNEY", "TREK", "QUEST", "CRUISE", "HALT", "STAY", "WAIT", "STOP"] },
    { w: "MONARCH", h: ["KING", "RULER", "TYRANT", "CROWN", "SLAVE", "PEASANT", "SERF", "SUBJECT"] },
    { w: "INFAMOUS", h: ["NOTED", "SHAMEFUL", "WICKED", "ODIOUS", "FAMOUS", "NOBLE", "GREAT", "HEROIC"] }
  ];

  function getGameDaySeed() {
    // FORCED 8:00 AM EST RESET
    const now = new Date();
    const nyTime = new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York',
      year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', hour12: false
    }).formatToParts(now);

    const d = {};
    nyTime.forEach(p => d[p.type] = p.value);

    let year = parseInt(d.year);
    let month = parseInt(d.month);
    let day = parseInt(d.day);
    let hour = parseInt(d.hour);

    if (hour < 8) {
      const yesterday = new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
      yesterday.setDate(yesterday.getDate() - 1);
      return yesterday.getFullYear() * 10000 + (yesterday.getMonth() + 1) * 100 + yesterday.getDate();
    }
    return year * 10000 + month * 100 + day;
  }

  function mulberry32(a) {
    return function() {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  const seed = getGameDaySeed();
  const rand = mulberry32(seed);

  const wordIdx = Math.floor(rand() * eternityLibrary.length);
  const dailyEntry = eternityLibrary[wordIdx];

  const gameData = {
    word: dailyEntry.w,
    hints: dailyEntry.h,
    cursed: Math.floor(rand() * 8),
    guesses: 0,
    swordsUsed: 0,
    startTime: Date.now(),
    dateString: new Intl.DateTimeFormat('en-US', {timeZone: 'America/New_York', month: '2-digit', day: '2-digit', year: 'numeric'}).format(new Date())
  };

  let active = true;

  function doPlunge(el, idx, isMirrored) {
    if (!active || el.querySelector('.hint-text')) return;
    gameData.swordsUsed++;
    el.innerHTML = `<img src="sword-yeshand.png" class="hand-plunge" style="${isMirrored ? 'transform: scaleX(-1)' : ''}">`;
    const hand = el.querySelector('.hand-plunge');
    const box = document.getElementById('box-img').getBoundingClientRect();
    const sRect = el.getBoundingClientRect();
    const distance = isMirrored ? (sRect.left - box.left - 60) * -1 : (box.right - sRect.right - 60);

    setTimeout(() => {
      hand.style.transform = `translateX(${distance}px) ${isMirrored ? 'scaleX(-1)' : 'scaleX(1)'}`;
      setTimeout(() => hand.style.opacity = "0", 300);
    }, 50);

    setTimeout(() => {
      if (idx === gameData.cursed) {
        endGame(false);
      } else {
        gasp.play();
        const color = isMirrored ? 'white' : 'var(--cyan)';
        el.innerHTML = `<span class="hint-text" style="color:${color}">${gameData.hints[idx]}</span>`;
      }
    }, 650);
  }

  function submitGuess() {
    if (!active) return;
    const input = document.getElementById('guess-input');
    const val = input.value.trim().toUpperCase();
    const status = document.getElementById('status-msg');
    if (val === "") return;
    gameData.guesses++;
    if (val === gameData.word) {
      endGame(true);
    } else {
      status.innerText = `${val} is INCORRECT`;
    }
    input.value = "";
  }

  function endGame(won) {
    active = false;
    const duration = Math.floor((Date.now() - gameData.startTime) / 1000);
    const overlay = document.getElementById('end-overlay');
    const title = document.getElementById('end-title');
    const stats = document.getElementById('end-stats');
    const retry = document.getElementById('retry-btn');
    
    if (won) {
      winChime.play();
      title.innerText = "FREED";
      title.style.color = "var(--cyan)";
      retry.style.display = "none";
      stats.innerHTML = `• Date: ${gameData.dateString}<br>• Word: ${gameData.word}<br>• Guesses: ${gameData.guesses}<br>• Swords: ${gameData.swordsUsed}<br>• Time: ${duration}s`;
    } else {
      scream.play();
      title.innerText = "DEAD";
      title.style.color = "var(--red)";
      retry.style.display = "block";
      document.getElementById('box-img').style.filter = "sepia(1) contrast(0.5) brightness(0.3)";
      stats.innerHTML = `• Date: ${gameData.dateString}<br>• Guesses: ${gameData.guesses}<br>• Swords: ${gameData.swordsUsed}<br>• Time: ${duration}s`;
    }
    overlay.style.display = 'flex';
  }

  function share() {
    const statsElement = document.getElementById('end-stats');
    let statsText = statsElement.innerText.replace(/• Word: .*\n?/, '');
    statsText = statsText.replace(/\n/g, ' | '); 
    const status = document.getElementById('end-title').innerText;
    const url = "https://russuxdesign.github.io/LetterSpectre/";
    const text = `Letter Spectre: ${status}!\n${statsText}\nPlay here: ${url}`;
    navigator.clipboard.writeText(text).then(() => {
        alert("Stats and link copied to clipboard!");
    });
  }

  document.getElementById('guess-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') submitGuess();
  });
  document.getElementById('guess-btn').onclick = submitGuess;
</script>
</body>
</html>
