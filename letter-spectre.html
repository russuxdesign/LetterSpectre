<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Letter Spectre</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030008; --purple: #6b21a8; --purple-bright: #a855f7;
    --purple-glow: #c084fc; --red: #ef4444; --red-bright: #ff2222;
    --cyan: #22d3ee; --text: #e2d4f0; --dim: #7c6a8e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:'Crimson Text',serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden; position:relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%,#1a0030 0%,transparent 60%),
                radial-gradient(ellipse 40% 30% at 50% 100%,#0d001a 0%,transparent 50%);
    pointer-events:none; z-index:0;
  }
  .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle {
    position:absolute; width:2px; height:2px; background:var(--purple-bright);
    border-radius:50%; opacity:0; animation:float-up linear infinite;
  }
  @keyframes float-up {
    0%{opacity:0;transform:translateY(0) scale(0)} 10%{opacity:0.6}
    90%{opacity:0.2} 100%{opacity:0;transform:translateY(-100vh) scale(2)}
  }
  #app {
    position:relative; z-index:1; width:100%; max-width:480px;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:0 0 32px 0;
  }
  /* HEADER */
  #date-header {
    width:100%; text-align:center; padding:10px 20px 5px;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
    color:var(--dim); text-transform:uppercase; border-bottom:1px solid #1a0030;
    position:relative; z-index:600;
  }
  #date-header .title-line {
    font-family:'Cinzel Decorative',serif; font-size:14px; letter-spacing:4px;
    color:var(--purple-glow); text-shadow:0 0 14px #6b21a870;
    display:block; margin-bottom:3px;
  }
  /* STAT BAR */
  #stat-bar {
    display:flex; gap:14px; padding:5px 20px;
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--dim);
  }
  .stat-item span { color:var(--purple-glow); }
  /* SPECTRE */
  #spectre-section {
    width:100%; display:flex; justify-content:center;
    align-items:flex-end; padding-top:4px; min-height:100px;
    position:relative; z-index:600; /* above modal tint */
  }
  .spectre-wrap {
    position:relative; display:flex; flex-direction:column;
    align-items:center; cursor:default;
  }
  .spectre-svg {
    width:90px; height:106px;
    filter:drop-shadow(0 0 14px #6b21a870) drop-shadow(0 0 30px #4a008060);
    user-select:none;
  }
  /* EYE GLOW — simple breathe from dim red to bright red, no lids */
  @keyframes eye-breathe {
    0%,100% { opacity:0.2; }
    50%     { opacity:1;   }
  }
  @keyframes eye-breathe-angry {
    0%,100% { opacity:0.7; }
    50%     { opacity:1;   }
  }
  .eye-orb {
    animation: eye-breathe 3.8s ease-in-out infinite;
  }
  .eye-orb.r  { animation-delay: 0.6s; }
  .eye-orb.angry { animation: eye-breathe-angry 1s ease-in-out infinite !important; }
  /* RESPONSE */
  #spectre-response {
    min-height:24px; text-align:center; font-family:'Cinzel',serif;
    font-size:12px; padding:5px 20px 2px; color:var(--text); letter-spacing:0.5px;
  }
  #spectre-response .wrong  { color:var(--red-bright); font-weight:700; }
  #spectre-response .correct{ color:#7fffb0; font-weight:700; }
  /* GUESS INPUT */
  #guess-section {
    width:calc(100% - 40px); display:flex; align-items:center;
    gap:10px; margin:5px 0 8px;
    background:#0a0014; border:1px solid #3d0f6e;
    border-radius:8px; padding:9px 12px; box-shadow:0 0 12px #6b21a820;
  }
  #guess-input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:'Cinzel',serif; font-size:16px;
    letter-spacing:1px; caret-color:var(--purple-glow);
  }
  #guess-input::placeholder { color:var(--dim); font-size:13px; }
  #guess-input:disabled { opacity:0.4; cursor:not-allowed; }
  #guess-btn {
    background:var(--purple); border:none; color:white;
    width:34px; height:34px; border-radius:6px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.2s,transform 0.1s; flex-shrink:0;
  }
  #guess-btn:hover { background:var(--purple-bright); }
  #guess-btn:active { transform:scale(0.93); }
  #guess-btn:disabled { opacity:0.4; cursor:not-allowed; }
  #guess-btn svg { width:17px; height:17px; }
  /* ARENA */
  #arena {
    width:calc(100% - 16px); display:grid;
    grid-template-columns:72px 1fr 72px;
    gap:4px; position:relative; flex:1; min-height:340px; align-items:start;
  }
  .sword-col { display:flex; flex-direction:column; align-items:center; padding-top:22px; }
  .sword-col-label {
    font-family:'Cinzel',serif; font-size:12px; letter-spacing:1px;
    color:var(--dim); text-transform:uppercase; margin-bottom:5px;
    width:100%;
  }
  .left-col  .sword-col-label { text-align:left;  padding-left:2px; }
  .right-col .sword-col-label { text-align:right; padding-right:2px; }
  .swords-list {
    display:flex; flex-direction:column; gap:0;
    align-items:center; width:100%; justify-content:space-around; flex:1;
  }
  .sword-slot {
    display:flex; flex-direction:column; align-items:flex-start;
    width:100%; gap:2px; min-height:72px; justify-content:center; position:relative;
  }
  .right-col .sword-slot { align-items:flex-end; }
  .sword-btn {
    background:none; border:none; cursor:pointer; padding:0;
    display:block; position:relative; width:72px; height:40px; flex-shrink:0;
    overflow:visible; transition:transform 0.15s,filter 0.15s;
  }
  .sword-btn:hover:not(:disabled) { transform:scale(1.1); filter:brightness(1.3) drop-shadow(0 0 6px #ff440060); }
  .sword-btn:disabled { cursor:default; }
  .sword-btn.used { opacity:0; pointer-events:none; }
  .sword-img {
    width:72px; height:40px; object-fit:contain; display:block;
  }
  /* Left col: flip horizontally so tip points RIGHT toward box */
  .left-col  .sword-img { transform:scaleX(-1); }
  /* Right col: normal orientation = tip points left already since pic has tip on right,
     we flip it to point left */
  .right-col .sword-img { transform:scaleX(1); }
  .sword-hand-img {
    width:72px; height:56px; object-fit:contain;
    display:none; position:absolute; top:-8px; left:0; pointer-events:none;
  }
  /* Plunge animations */
  .sword-btn.plunging      { animation:plunge-r 0.55s ease-in forwards; }
  .sword-btn.plunging-left { animation:plunge-l 0.55s ease-in forwards; }
  @keyframes plunge-r {
    0%{transform:translateX(0);opacity:1}
    55%{transform:translateX(80px);opacity:1}
    100%{transform:translateX(80px);opacity:0}
  }
  @keyframes plunge-l {
    0%{transform:translateX(0);opacity:1}
    55%{transform:translateX(-80px);opacity:1}
    100%{transform:translateX(-80px);opacity:0}
  }
  /* Hint chips — no box, large font, left/right justified */
  .hint-chip {
    font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.5px;
    color:var(--purple-glow); line-height:1.3; padding:2px 0;
    background:none; border:none; width:100%; word-break:break-word;
    animation:chip-in 0.4s ease-out; display:none; text-align:left;
  }
  .hint-chip.antonym { color:#fca5a5; text-align:right; }
  .hint-chip.show    { display:block; }
  @keyframes chip-in {
    from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1}
  }
  /* BOX */
  #box-wrap {
    display:flex; flex-direction:column;
    align-items:center; padding-top:22px; flex:1;
  }
  #magic-box {
    width:100%; flex:1; position:relative; overflow:visible;
    min-height:300px; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  #box-img {
    width:100%; max-height:340px; object-fit:contain; display:block;
    animation:box-shake 4s ease-in-out infinite; transform-origin:center bottom;
    position:relative; z-index:2;
  }
  @keyframes box-shake {
    0%,82%,100%{transform:rotate(0deg) translateX(0)}
    84%{transform:rotate(-1.6deg) translateX(-3px)}
    86%{transform:rotate(1.6deg)  translateX(3px)}
    88%{transform:rotate(-1.4deg) translateX(-3px)}
    90%{transform:rotate(1.4deg)  translateX(2px)}
    92%{transform:rotate(-0.7deg) translateX(-1px)}
    95%{transform:rotate(0deg)    translateX(0)}
  }
  #man-container {
    position:absolute; inset:0; display:flex;
    align-items:center; justify-content:center; z-index:5;
  }
  .man-svg { width:64px; opacity:0; transition:opacity 0.6s; filter:drop-shadow(0 0 10px #6b21a870); }
  .man-svg.freed { opacity:1; animation:mf 2s ease-in-out infinite; filter:drop-shadow(0 0 15px #7fffb080); }
  @keyframes mf { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  /* Dark red death flash */
  #death-overlay {
    position:fixed; inset:0; z-index:350; pointer-events:none;
    display:none; background:#990000;
    animation:death-red 2.2s ease-out forwards;
  }
  #death-overlay.show { display:block; }
  @keyframes death-red {
    0%{opacity:0} 12%{opacity:0.75} 50%{opacity:0.55} 100%{opacity:0}
  }
  /* MODAL — full dark backdrop but spectre head punches through via z-index.
     #app has z-index:1, spectre-section inside it. Modal is z-index:500 but
     we carve out space by making the TOP portion of the backdrop transparent
     so the spectre head (roughly top 165px of the page) remains unobscured. */
  #modal-backdrop {
    position:fixed; inset:0; z-index:490;
    pointer-events:none;
    display:none;
  }
  #modal-backdrop.visible { display:block; }
  /* Dark tint starts BELOW the spectre head */
  #modal-tint {
    position:absolute; left:0; right:0; bottom:0; top:165px;
    background:rgba(2,0,10,0.90);
    backdrop-filter:blur(2px);
    pointer-events:all;
  }
  /* Bubble sits just below spectre */
  #bubble-positioner {
    position:absolute; top:170px; left:0; right:0;
    display:flex; justify-content:center;
    padding:0 20px;
    pointer-events:none;
  }
  #word-bubble {
    background:#0e0018; border:1px solid #5b1a9a; border-radius:16px;
    padding:20px 20px 18px; padding-top:14px; width:100%; max-width:400px;
    font-family:'Crimson Text',serif; font-size:16px; line-height:1.7;
    color:var(--text); box-shadow:0 0 30px #6b21a860; position:relative;
    animation:brise 0.35s ease-out; pointer-events:all; z-index:501;
  }
  @keyframes brise { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
  #word-bubble::after {
    content:''; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
    border:10px solid transparent; border-bottom-color:#5b1a9a;
  }
  #word-bubble::before {
    content:''; position:absolute; bottom:calc(100% - 2px); left:50%; transform:translateX(-50%);
    border:9px solid transparent; border-bottom-color:#0e0018; z-index:1;
  }
  #bubble-close {
    position:absolute; top:8px; right:10px; background:none; border:none;
    color:var(--dim); cursor:pointer; font-size:20px; line-height:1;
    padding:4px 6px; transition:color 0.2s; z-index:502; pointer-events:all;
    display:block; touch-action:manipulation;
  }
  #bubble-close:hover { color:var(--red); }
  .cursed-word { color:var(--cyan); font-weight:700; }
  .strike-word { color:var(--red-bright); font-weight:700; }
  /* END OVERLAY */
  #end-overlay {
    position:fixed; inset:0; z-index:400;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    background:#030008ee; backdrop-filter:blur(4px);
  }
  #end-overlay.visible { display:flex; }
  .end-card {
    background:#0d0020; border:1px solid; border-radius:16px;
    padding:34px 26px 26px; max-width:340px; width:90%; text-align:center;
  }
  .end-card.win  { border-color:#22c55e; box-shadow:0 0 40px #22c55e30; }
  .end-card.lose { border-color:var(--red); box-shadow:0 0 40px #ef444440; }
  .end-title { font-family:'Cinzel Decorative',serif; font-size:24px; margin-bottom:12px; }
  .end-title.win  { color:#22c55e; text-shadow:0 0 20px #22c55e80; }
  .end-title.lose { color:var(--red-bright); text-shadow:0 0 20px #ff222280; }
  .end-body  { font-size:15px; line-height:1.7; color:var(--text); margin-bottom:14px; }
  .end-word  { font-family:'Cinzel',serif; font-size:22px; color:var(--purple-glow); letter-spacing:4px; margin:8px 0; }
  .end-stats { font-family:'Cinzel',serif; font-size:11px; color:var(--dim); letter-spacing:1px; line-height:1.9; margin-bottom:18px; }
  .share-btn {
    background:var(--purple); border:none; color:white;
    font-family:'Cinzel',serif; font-size:13px; letter-spacing:2px;
    padding:13px 24px; border-radius:8px; cursor:pointer; width:100%;
    transition:background 0.2s,transform 0.1s; text-transform:uppercase;
  }
  .share-btn:hover { background:var(--purple-bright); }
  .share-btn.lose-btn { background:#7a1020; }
  .share-btn.lose-btn:hover { background:#b01a2e; }
  .free-flash {
    position:fixed; inset:0; pointer-events:none; z-index:350;
    background:radial-gradient(ellipse at 50% 40%,#22c55e28 0%,transparent 60%);
    animation:flout 1.2s ease-out forwards;
  }
  @keyframes flout { 0%{opacity:0} 20%{opacity:1} 100%{opacity:0} }
  #toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#1a0030; border:1px solid var(--purple);
    color:var(--purple-glow); font-family:'Cinzel',serif;
    font-size:12px; letter-spacing:1px; padding:10px 22px;
    border-radius:24px; transition:transform 0.3s ease;
    z-index:999; pointer-events:none;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>

        <g id="left-eye" class="eye-orb" transform="translate(60,93)">
          <circle r="16" fill="#aa0000" filter="url(#eyeB2)"/>
          <circle r="10" fill="#cc0000" filter="url(#eyeB)"/>
          <circle r="6"  fill="#ff3333"/>
          <circle r="2.5" fill="#ff9999" cx="2" cy="-2.5"/>
        </g>
        <!-- RIGHT EYE -->
        <g id="right-eye" class="eye-orb r" transform="translate(110,93)">
          <circle r="16" fill="#aa0000" filter="url(#eyeB2)"/>
          <circle r="10" fill="#cc0000" filter="url(#eyeB)"/>
          <circle r="6"  fill="#ff3333"/>
          <circle r="2.5" fill="#ff9999" cx="2" cy="-2.5"/>
        </g>
        <path d="M72,130 Q85,136 98,130" fill="none" stroke="#2d0050" stroke-width="1.5" opacity="0.45"/>
      </svg>
    </div>
  </div>
  <div id="spectre-response"></div>
  <div id="guess-section">
    <input type="text" id="guess-input" placeholder="Enter your guess…"
           autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="guess-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
  <!-- ARENA -->
  <div id="arena">
    <div class="sword-col left-col">
      <div class="sword-col-label">synonyms</div>
      <div class="swords-list" id="syn-swords"></div>
    </div>
    <div id="box-wrap">
      <div id="magic-box">
        <img id="box-img" alt="Magic Box"/>
        <div id="man-container">
          <svg class="man-svg" id="man-svg" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="mG" cx="50%" cy="30%" r="60%">
                <stop offset="0%" stop-color="#c084fc"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </radialGradient>
            </defs>
            <circle cx="40" cy="22" r="14" fill="url(#mG)" opacity="0.9"/>
            <circle cx="35" cy="19" r="2" fill="#0d0020"/>
            <circle cx="45" cy="19" r="2" fill="#0d0020"/>
            <path d="M35,27 Q40,31 45,27" fill="none" stroke="#0d0020" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="28" y="38" width="24" height="38" rx="5" fill="#6d28d9" opacity="0.9"/>
            <path d="M28,44 L12,60" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
            <path d="M52,44 L68,60" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
            <path d="M34,76 L28,105" stroke="#5b21b6" stroke-width="8" stroke-linecap="round"/>
            <path d="M46,76 L52,105" stroke="#5b21b6" stroke-width="8" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="sword-col right-col">
      <div class="sword-col-label">antonyms</div>
      <div class="swords-list" id="ant-swords"></div>
    </div>
  </div>
</div>

<div id="death-overlay"></div>

<div id="modal-backdrop">
  <!-- Tint covers only below the spectre head -->
  <div id="modal-tint"></div>
  <!-- Bubble positioned just below spectre -->
  <div id="bubble-positioner">
    <div id="word-bubble">
      <button id="bubble-close">✕</button>
      I'm thinking of a word. Guess what it is to free the man in the box.<br><br>
      Need a hint? Choose a sword. I should warn you though, one of the swords is
      <span class="cursed-word">CURSED</span> and will
      <span class="strike-word">STRIKE</span> the man. Do you dare take the risk?
    </div>
  </div>
</div>

<div id="end-overlay">
  <div class="end-card" id="end-card">
    <div class="end-title" id="end-title"></div>
    <div class="end-body"  id="end-body"></div>
    <div class="end-word"  id="end-word"></div>
    <div class="end-stats" id="end-stats"></div>
    <button class="share-btn" id="share-btn"></button>
  </div>
</div>
<div id="toast">Copied!</div>

<script>
const WORD_DATA=[
  {word:"SHADOW",   synonyms:["SHADE","SILHOUETTE","GLOOM","DARKNESS"],  antonyms:["LIGHT","BRIGHTNESS","CLARITY","RADIANCE"]},
  {word:"ANCIENT",  synonyms:["ARCHAIC","PRIMEVAL","AGED","VENERABLE"],  antonyms:["MODERN","RECENT","YOUNG","NEW"]},
  {word:"WRATH",    synonyms:["FURY","RAGE","IRE","ANGER"],              antonyms:["CALM","PEACE","JOY","SERENITY"]},
  {word:"PHANTOM",  synonyms:["SPECTER","WRAITH","GHOST","APPARITION"],  antonyms:["REALITY","SUBSTANCE","FLESH","BODY"]},
  {word:"GRIM",     synonyms:["SOMBER","BLEAK","STERN","DOUR"],          antonyms:["CHEERFUL","BRIGHT","MERRY","JOYFUL"]},
  {word:"CURSE",    synonyms:["HEX","JINX","BLIGHT","SPELL"],            antonyms:["BLESS","CHARM","GRACE","BOON"]},
  {word:"DREAD",    synonyms:["TERROR","FEAR","HORROR","FRIGHT"],        antonyms:["COURAGE","CALM","PEACE","HOPE"]},
  {word:"CRYPTIC",  synonyms:["OBSCURE","ARCANE","MYSTIC","VEILED"],     antonyms:["CLEAR","PLAIN","OBVIOUS","OPEN"]},
  {word:"MALEVOLENT",synonyms:["SINISTER","WICKED","VILE","EVIL"],       antonyms:["KIND","BENIGN","GOOD","NOBLE"]},
  {word:"OMINOUS",  synonyms:["FOREBODING","DIRE","DARK","GRIM"],        antonyms:["HOPEFUL","BRIGHT","LUCKY","AUSPICIOUS"]},
  {word:"VOID",     synonyms:["ABYSS","EMPTINESS","NULL","VACUUM"],      antonyms:["FULLNESS","SOLID","PRESENCE","MATTER"]},
  {word:"EERIE",    synonyms:["UNCANNY","SPOOKY","WEIRD","GHOSTLY"],     antonyms:["NORMAL","FAMILIAR","SAFE","NATURAL"]},
  {word:"SHROUD",   synonyms:["VEIL","CLOAK","WRAP","MANTLE"],           antonyms:["UNCOVER","REVEAL","EXPOSE","UNVEIL"]},
  {word:"SINISTER", synonyms:["MENACING","DARK","OMINOUS","EVIL"],       antonyms:["BENIGN","GOOD","INNOCENT","HARMLESS"]},
  {word:"ENIGMA",   synonyms:["MYSTERY","RIDDLE","PUZZLE","CONUNDRUM"],  antonyms:["ANSWER","SOLUTION","CLARITY","TRUTH"]},
  {word:"FORLORN",  synonyms:["DESOLATE","HOPELESS","MISERABLE","LOST"], antonyms:["HOPEFUL","CHEERFUL","JOYFUL","CONTENT"]},
  {word:"ABYSS",    synonyms:["CHASM","VOID","GULF","DEPTHS"],           antonyms:["PEAK","SUMMIT","HEIGHT","SURFACE"]},
  {word:"WICKED",   synonyms:["EVIL","VILE","SINFUL","CORRUPT"],         antonyms:["VIRTUOUS","PURE","HOLY","RIGHTEOUS"]},
  {word:"TORMENT",  synonyms:["AGONY","ANGUISH","MISERY","SUFFERING"],   antonyms:["COMFORT","RELIEF","JOY","PEACE"]},
  {word:"GLOOM",    synonyms:["MURK","DUSK","DIMNESS","SHADOW"],         antonyms:["RADIANCE","SUNLIGHT","BRIGHTNESS","CHEER"]},
  {word:"MACABRE",  synonyms:["GHOULISH","MORBID","GRISLY","GROTESQUE"], antonyms:["CHEERFUL","WHOLESOME","PLEASANT","LIGHT"]},
  {word:"DESOLATE", synonyms:["BARREN","BLEAK","STARK","DESTITUTE"],     antonyms:["LUSH","VIBRANT","POPULATED","THRIVING"]},
  {word:"SPECTER",  synonyms:["GHOST","WRAITH","SHADE","PHANTOM"],       antonyms:["LIVING","MORTAL","FLESH","BODY"]},
  {word:"GRAVE",    synonyms:["TOMB","SEPULCHER","CRYPT","VAULT"],       antonyms:["CRADLE","LIFE","BIRTH","BEGINNING"]},
  {word:"DUSK",     synonyms:["TWILIGHT","EVENTIDE","GLOAMING","NIGHTFALL"],antonyms:["DAWN","DAYBREAK","SUNRISE","MORNING"]},
  {word:"HAUNTED",  synonyms:["POSSESSED","CURSED","TORMENTED","PLAGUED"],antonyms:["FREE","PURE","CLEAR","PEACEFUL"]},
  {word:"MALICE",   synonyms:["SPITE","HATRED","VENOM","ILL WILL"],      antonyms:["KINDNESS","LOVE","GOODWILL","CHARITY"]},
  {word:"PERIL",    synonyms:["DANGER","HAZARD","JEOPARDY","RISK"],      antonyms:["SAFETY","SECURITY","SHELTER","HAVEN"]},
  {word:"LAMENT",   synonyms:["MOURN","GRIEVE","WAIL","BEMOAN"],         antonyms:["REJOICE","CELEBRATE","CHEER","PRAISE"]},
  {word:"OBLIVION", synonyms:["NOTHINGNESS","VOID","DARKNESS","ERASURE"],antonyms:["MEMORY","AWARENESS","EXISTENCE","BEING"]},
];

function getDailySeed(){
  const now=new Date();
  const est=new Date(now.toLocaleString("en-US",{timeZone:"America/New_York"}));
  if(est.getHours()<8) est.setDate(est.getDate()-1);
  return `${est.getFullYear()}-${est.getMonth()}-${est.getDate()}`;
}
function seedRandom(s){ let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return Math.abs(h); }

const seed=getDailySeed();
const sn=seedRandom(seed);
const wordEntry=WORD_DATA[sn%WORD_DATA.length];
const TARGET_WORD=wordEntry.word;
const CURSED_IDX=sn%8;

const SKEY=`letter-spectre-${seed}`;
const POPUP_KEY=`ls-popup-seen-${seed}`;

function loadState(){
  try{const s=localStorage.getItem(SKEY);if(s)return JSON.parse(s);}catch(e){}
  return{guesses:0,hints:0,revealedSyns:[],revealedAnts:[],usedSwords:[],status:'playing',startTime:Date.now(),endTime:null,guessedWords:[]};
}
function saveState(st){localStorage.setItem(SKEY,JSON.stringify(st));}
let gs=loadState();

// Sword image prep — crop the top/bottom halves of the sword image
let swordTopURL='', swordHandURL='';
function prepSwordImages(){
  return new Promise(resolve=>{
    const img=document.getElementById('img-sword');
    // Image is 1280x698 — top half = plain sword, bottom half = skeleton hand sword
    const W=1280, H=698, halfH=Math.floor(H/2)-10;
    const c=document.createElement('canvas'); c.width=W; c.height=halfH;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,W,halfH,0,0,W,halfH);
    swordTopURL=c.toDataURL('image/jpeg',0.85);
    ctx.clearRect(0,0,W,halfH);
    ctx.drawImage(img,0,halfH+15,W,halfH,0,0,W,halfH);
    swordHandURL=c.toDataURL('image/jpeg',0.85);
    resolve();
  });
}

function playPlunge(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)(),t=ac.currentTime;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(50,t+0.22);
    g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.3);
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*0.12),ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const bs=ac.createBufferSource(),bg=ac.createGain(); bg.gain.value=0.4;
    bs.buffer=buf; bs.connect(bg);bg.connect(ac.destination); bs.start(t+0.12);
  }catch(e){}
}
function playGasp(){ const el=document.getElementById('snd-gasp'); if(el){el.currentTime=0;el.play().catch(()=>{});} }
function playScream(){ const el=document.getElementById('snd-scream'); if(el){el.currentTime=0;el.play().catch(()=>{});} }

function spawnParticles(){
  const c=document.getElementById('particles');
  for(let i=0;i<28;i++){
    const p=document.createElement('div'); p.className='particle';
    p.style.left=Math.random()*100+'%'; p.style.bottom='-4px';
    p.style.animationDuration=(6+Math.random()*10)+'s';
    p.style.animationDelay=(Math.random()*12)+'s';
    const sz=(1+Math.random()*2)+'px'; p.style.width=p.style.height=sz;
    c.appendChild(p);
  }
}

function buildSwords(){
  const sc=document.getElementById('syn-swords');
  const ac=document.getElementById('ant-swords');
  sc.innerHTML=''; ac.innerHTML='';
  for(let i=0;i<4;i++){
    // SYN — left column, tip points right
    const slot=document.createElement('div'); slot.className='sword-slot';
    const btn=document.createElement('button'); btn.className='sword-btn';
    const si=document.createElement('img'); si.className='sword-img'; si.src=swordTopURL; si.alt='sword';
    const hi=document.createElement('img'); hi.className='sword-hand-img'; hi.src=swordHandURL; hi.alt='';
    btn.appendChild(si); btn.appendChild(hi);
    if(gs.usedSwords.includes(i)) btn.classList.add('used');
    if(gs.status!=='playing') btn.disabled=true;
    btn.addEventListener('click',()=>onSword(i,'syn',btn,slot));
    const chip=document.createElement('div'); chip.className='hint-chip'; chip.id=`cs${i}`;
    if(gs.revealedSyns.includes(i)){chip.textContent=wordEntry.synonyms[i];chip.classList.add('show');}
    slot.appendChild(btn); slot.appendChild(chip); sc.appendChild(slot);

    // ANT — right column, tip points left
    const slot2=document.createElement('div'); slot2.className='sword-slot';
    const btn2=document.createElement('button'); btn2.className='sword-btn';
    const si2=document.createElement('img'); si2.className='sword-img'; si2.src=swordTopURL; si2.alt='sword';
    const hi2=document.createElement('img'); hi2.className='sword-hand-img'; hi2.src=swordHandURL; hi2.alt='';
    btn2.appendChild(si2); btn2.appendChild(hi2);
    const gi=i+4;
    if(gs.usedSwords.includes(gi)) btn2.classList.add('used');
    if(gs.status!=='playing') btn2.disabled=true;
    btn2.addEventListener('click',()=>onSword(gi,'ant',btn2,slot2));
    const chip2=document.createElement('div'); chip2.className='hint-chip antonym'; chip2.id=`ca${i}`;
    if(gs.revealedAnts.includes(i)){chip2.textContent=wordEntry.antonyms[i];chip2.classList.add('show');}
    slot2.appendChild(btn2); slot2.appendChild(chip2); ac.appendChild(slot2);
  }
}

function onSword(sIdx,side,btn,slot){
  if(gs.status!=='playing'||gs.usedSwords.includes(sIdx)) return;
  btn.disabled=true;
  const si=btn.querySelector('.sword-img');
  const hi=btn.querySelector('.sword-hand-img');
  if(si) si.style.display='none';
  if(hi) hi.style.display='block';
  btn.classList.add(side==='syn'?'plunging':'plunging-left');
  const cursed=sIdx===CURSED_IDX;
  playPlunge();
  setTimeout(()=>{
    btn.classList.add('used');
    if(si) si.style.display='';
    if(hi) hi.style.display='none';
    if(cursed){
      playScream();
      const dov=document.getElementById('death-overlay');
      dov.classList.add('show');
      setTimeout(()=>dov.classList.remove('show'),2400);
      gs.status='lost'; gs.endTime=Date.now();
      gs.usedSwords.push(sIdx); saveState(gs);
      setEyes('angry'); disableAll();
      setTimeout(()=>showEnd(false),2200);
    } else {
      playGasp();
      gs.usedSwords.push(sIdx); gs.hints++;
      const hi2=sIdx<4?sIdx:sIdx-4;
      if(side==='syn'&&!gs.revealedSyns.includes(hi2)){
        gs.revealedSyns.push(hi2);
        const c=document.getElementById(`cs${hi2}`);
        if(c){c.textContent=wordEntry.synonyms[hi2];c.classList.add('show');}
      } else if(side==='ant'&&!gs.revealedAnts.includes(hi2)){
        gs.revealedAnts.push(hi2);
        const c=document.getElementById(`ca${hi2}`);
        if(c){c.textContent=wordEntry.antonyms[hi2];c.classList.add('show');}
      }
      saveState(gs); updateStats();
    }
  },580);
}

function submitGuess(){
  const inp=document.getElementById('guess-input');
  const val=inp.value.trim().toUpperCase();
  if(!val||gs.status!=='playing') return;
  gs.guesses++; gs.guessedWords.push(val);
  const resp=document.getElementById('spectre-response');
  if(val===TARGET_WORD){
    gs.status='won'; gs.endTime=Date.now(); saveState(gs);
    resp.innerHTML=`<span class="correct">✓ CORRECT!</span> The word was ${TARGET_WORD}!`;
    freeFlash(); setEyes('idle');
    document.getElementById('man-svg').classList.add('freed');
    document.getElementById('guess-input').disabled=true;
    document.getElementById('guess-btn').disabled=true;
    disableAll();
    setTimeout(()=>showEnd(true),1400);
  } else {
    resp.innerHTML=`<span style="font-family:'Cinzel',serif">"${val}"</span> is <span class="wrong">INCORRECT</span>. Guess again!`;
    setEyes('angry'); setTimeout(()=>setEyes('idle'),2500);
  }
  inp.value=''; saveState(gs); updateStats();
}

function setEyes(state){
  ['left-eye','right-eye'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    if(state==='angry') el.classList.add('angry');
    else el.classList.remove('angry');
  });
}
function freeFlash(){const d=document.createElement('div');d.className='free-flash';document.body.appendChild(d);setTimeout(()=>d.remove(),1400);}
function updateStats(){
  document.getElementById('stat-guesses').textContent=gs.guesses;
  document.getElementById('stat-hints').textContent=gs.hints;
}
function elapsed(){ return Math.floor(((gs.endTime||Date.now())-gs.startTime)/1000); }
function fmt(s){ return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

function showEnd(won){
  const card=document.getElementById('end-card');
  const title=document.getElementById('end-title');
  const body=document.getElementById('end-body');
  const wordEl=document.getElementById('end-word');
  const stats=document.getElementById('end-stats');
  const btn=document.getElementById('share-btn');
  const el=fmt(elapsed());
  if(won){
    card.className='end-card win'; title.className='end-title win'; title.textContent='FREED!';
    body.innerHTML='The man has been released from the Spectre's curse. The word was:';
    wordEl.textContent=TARGET_WORD;
    stats.innerHTML=`GUESSES: ${gs.guesses} &nbsp;|&nbsp; HINTS: ${gs.hints} &nbsp;|&nbsp; TIME: ${el}`;
    btn.className='share-btn'; btn.textContent='SHARE VICTORY';
  } else {
    card.className='end-card lose'; title.className='end-title lose'; title.textContent='STRUCK DOWN!';
    body.innerHTML='The cursed sword has pierced the man. He is lost. The word was:';
    wordEl.textContent=TARGET_WORD;
    stats.innerHTML=`GUESSES: ${gs.guesses} &nbsp;|&nbsp; HINTS USED: ${gs.hints} &nbsp;|&nbsp; TIME: ${el}<br>Return tomorrow for a new word.`;
    btn.className='share-btn lose-btn'; btn.textContent='SHARE DEFEAT';
  }
  document.getElementById('end-overlay').classList.add('visible');
  btn.onclick=()=>share(won);
}

function share(won){
  const el=fmt(elapsed());
  const dateStr=document.getElementById('today-date').textContent;
  const swords=Array.from({length:8},(_,i)=>{
    if(i===CURSED_IDX) return gs.usedSwords.includes(i)?'🗡':'⚫';
    return gs.usedSwords.includes(i)?'🔵':'⚫';
  }).join('');
  const text=`LETTER SPECTRE\n${dateStr}\n\n${won?'VICTORY':'DEFEATED'}\nGuesses: ${gs.guesses} | Hints: ${gs.hints} | Time: ${el}\n\nSwords: ${swords}\n\nletterspectre.com`;
  navigator.clipboard.writeText(text).then(()=>toast('Copied!')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast('Copied!');
  });
}

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function disableAll(){ document.querySelectorAll('.sword-btn').forEach(b=>b.disabled=true); }

function setDate(){
  const now=new Date();
  const est=new Date(now.toLocaleString("en-US",{timeZone:"America/New_York"}));
  if(est.getHours()<8) est.setDate(est.getDate()-1);
  document.getElementById('today-date').textContent=est.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
}

function initPopup(){
  const seen=localStorage.getItem(POPUP_KEY);
  const backdrop=document.getElementById('modal-backdrop');
  if(!seen){ backdrop.classList.add('visible'); }
  document.getElementById('bubble-close').addEventListener('click',()=>{
    backdrop.classList.remove('visible');
    localStorage.setItem(POPUP_KEY,'1');
  });
}

function restore(){
  if(gs.status==='won'){
    document.getElementById('man-svg').classList.add('freed');
    document.getElementById('spectre-response').innerHTML=`The word was <span style="color:var(--purple-glow);font-family:'Cinzel',serif">${TARGET_WORD}</span>.`;
    document.getElementById('guess-input').disabled=true;
    document.getElementById('guess-btn').disabled=true;
    disableAll(); setTimeout(()=>showEnd(true),400);
  } else if(gs.status==='lost'){
    setEyes('angry');
    document.getElementById('spectre-response').innerHTML='The cursed sword struck. Return tomorrow.';
    document.getElementById('guess-input').disabled=true;
    document.getElementById('guess-btn').disabled=true;
    disableAll(); setTimeout(()=>showEnd(false),400);
  }
}

async function init(){
  setDate(); spawnParticles();
  document.getElementById('box-img').src=document.getElementById('img-box').src;
  await prepSwordImages();
  buildSwords(); updateStats(); restore(); initPopup();
  document.getElementById('guess-input').addEventListener('keydown',e=>{ if(e.key==='Enter') submitGuess(); });
  document.getElementById('guess-btn').addEventListener('click',submitGuess);
}
window.addEventListener('load',init);
</script>
</body>
</html>
